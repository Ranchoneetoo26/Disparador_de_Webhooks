services:
  db:
    # ... sua configuração do postgres ...
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: disparador_test # Docker compose cria o banco de teste
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
